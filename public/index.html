<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stellar Quick Tracker</title>
    <style>
        :root { --primary: #0070f3; --success: #00c853; --danger: #ff4d4d; --edit: #f5a623; }
        body { font-family: -apple-system, sans-serif; background: #f0f2f5; margin: 0; padding: 20px; color: #2c3e50; }
        .container { max-width: 1000px; margin: 0 auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #eee; margin-bottom: 20px; padding-bottom: 10px; }
        h1 { font-size: 20px; margin: 0; }
        .controls { display: flex; gap: 10px; align-items: center; }
        .xlm-badge { background: #eef2f7; padding: 6px 12px; border-radius: 20px; font-weight: bold; font-size: 0.85em; border: 1px solid #d0d7de; }
        .btn-refresh { background: var(--success); color: white; padding: 6px 12px; font-size: 0.8em; border-radius: 15px; border: none; cursor: pointer; }
        .form-group { display: grid; grid-template-columns: 1fr 1.5fr auto; gap: 10px; margin-bottom: 25px; background: #f8f9fa; padding: 15px; border-radius: 8px; }
        input { padding: 12px; border: 1px solid #ddd; border-radius: 6px; }
        .btn-add { background: var(--primary); color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; padding: 0 20px; min-width: 80px; }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 12px; background: #fafafa; border-bottom: 2px solid #eee; font-size: 13px; }
        td { padding: 15px; border-bottom: 1px solid #eee; vertical-align: top; }
        .asset-item { display: flex; justify-content: space-between; margin-bottom: 5px; font-size: 0.9em; border-bottom: 1px dashed #f0f0f0; padding-bottom: 3px; }
        .asset-code { font-weight: 800; color: var(--primary); background: #f0f7ff; padding: 2px 6px; border-radius: 4px; font-size: 0.8em; }
        .jpy-val { font-weight: bold; color: #444; }
        .total-box { margin-top: 10px; text-align: right; color: var(--success); font-weight: 900; font-size: 1.1em; border-top: 2px solid #eee; padding-top: 8px; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>🚀 Stellar 資産自動解析</h1>
        <div class="controls">
            <button class="btn-refresh" onclick="location.reload()">🔄 全更新</button>
            <div id="xlmPrice" class="xlm-badge">価格取得中...</div>
        </div>
    </header>

    <div class="form-group">
        <input type="text" id="nameIn" placeholder="名前">
        <input type="text" id="addrIn" placeholder="G...">
        <button class="btn-add" onclick="handleAdd()">追加</button>
    </div>

    <table>
        <thead>
            <tr>
                <th style="width: 20%;">ラベル</th>
                <th style="width: 65%;">保有資産 (統合・即時換算)</th>
                <th style="width: 15%;">操作</th>
            </tr>
        </thead>
        <tbody id="listBody"></tbody>
    </table>
</div>

<script>
    // キー名を新しくして過去のゴミデータを回避
    let accounts = JSON.parse(localStorage.getItem('stellar_tracker_v5')) || [];
    let xlmJpy = 22;

    window.onload = async () => {
        await updatePrice();
        render();
        setInterval(updatePrice, 60000);
    };

    async function updatePrice() {
        try {
            const res = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=stellar&vs_currencies=jpy');
            const data = await res.json();
            if(data.stellar.jpy) {
                xlmJpy = data.stellar.jpy;
                document.getElementById('xlmPrice').innerText = `1 XLM = ¥${xlmJpy.toLocaleString()}`;
            }
        } catch(e) { console.log("Price fetch error"); }
    }

    // 追加ボタンの処理
    function handleAdd() {
        const n = document.getElementById('nameIn');
        const a = document.getElementById('addrIn');
        const addr = a.value.trim();

        if(!addr.startsWith('G') || addr.length < 50) {
            alert("有効なStellarアドレス(G...)を入力してください");
            return;
        }

        accounts.push({ id: Date.now(), name: n.value || "未設定", addr: addr });
        localStorage.setItem('stellar_tracker_v5', JSON.stringify(accounts));
        
        n.value = ''; 
        a.value = '';
        render(); // すぐにリストを描画
    }

    async function getRate(code, issuer) {
        try {
            const res = await fetch(`https://horizon.stellar.org/order_book?selling_asset_type=credit_alphanum4&selling_asset_code=${code}&selling_asset_issuer=${issuer}&buying_asset_type=native&limit=1`);
            const data = await res.json();
            return (data.bids && data.bids.length > 0) ? parseFloat(data.bids[0].price) : 0;
        } catch(e) { return 0; }
    }

    function render() {
        const body = document.getElementById('listBody');
        body.innerHTML = '';
        
        if (accounts.length === 0) {
            body.innerHTML = '<tr><td colspan="3" style="text-align:center;color:#ccc;padding:20px;">アドレスを追加してください</td></tr>';
            return;
        }

        accounts.forEach(acc => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td><strong>${acc.name}</strong><br><small style="color:#999;font-size:10px">${acc.addr.substring(0,10)}...</small></td>
                <td id="res-${acc.id}"><span style="color:#ccc">解析中...</span></td>
                <td>
                    <button onclick="handleEdit(${acc.id})" style="background:var(--edit);color:white;border:none;padding:4px 8px;border-radius:
