<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stellar Asset Portal - Stardust Edition</title>
    <style>
        :root {
            --bg-body: #f0f4f8;
            --primary: #0070f3;
            --success: #00c853;
            --danger: #ff4d4f;
            --edit: #f5a623;
            --stardust: #7b2ff7; /* Stardust用の特別色 */
            --text-main: #2c3e50;
            --text-sub: #7f8c8d;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(12px);
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.05);
            border: 1px solid rgba(255,255,255,0.3);
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            border-bottom: 2px solid #edf2f7;
            padding-bottom: 15px;
        }

        .price-badges { display: flex; gap: 10px; flex-wrap: wrap; }
        .badge {
            background: #fff;
            padding: 6px 14px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 0.8em;
            color: var(--primary);
            border: 1px solid #e2e8f0;
        }

        .form-group {
            display: grid;
            grid-template-columns: 1fr 2fr auto;
            gap: 12px;
            margin-bottom: 35px;
            background: #fff;
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.02);
        }

        input { padding: 12px; border: 1px solid #e2e8f0; border-radius: 10px; font-size: 14px; }
        .btn-add { background: var(--primary); color: white; border: none; border-radius: 10px; padding: 0 25px; font-weight: 700; cursor: pointer; }

        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 12px; color: var(--text-sub); font-size: 11px; text-transform: uppercase; border-bottom: 2px solid #f1f5f9; }
        td { padding: 20px 12px; border-bottom: 1px solid #f1f5f9; vertical-align: top; }

        .acc-name { font-weight: 800; font-size: 1.1em; display: block; }
        .acc-addr { font-family: monospace; font-size: 10px; color: var(--text-sub); opacity: 0.7; }

        .asset-container { display: flex; flex-direction: column; gap: 8px; }
        .asset-card {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #fff;
            padding: 10px 15px;
            border-radius: 10px;
            border: 1px solid #f1f5f9;
        }

        .asset-code {
            font-weight: 900;
            font-size: 0.75em;
            padding: 3px 8px;
            border-radius: 5px;
            min-width: 65px;
            text-align: center;
            background: #ebf4ff;
            color: var(--primary);
        }

        /* STARDUST用の特別バッジスタイル */
        .asset-code.stardust {
            background: #f3ebff;
            color: var(--stardust);
        }

        .asset-amt { font-family: 'Roboto Mono', monospace; font-weight: 600; font-size: 0.9em; margin-left: 10px; }
        .asset-jpy { font-weight: 800; color: #4a5568; }

        .total-row {
            margin-top: 12px;
            text-align: right;
            font-weight: 900;
            font-size: 1.2em;
            color: var(--success);
        }

        .btn-action { padding: 6px; border: none; border-radius: 6px; color: white; font-size: 10px; font-weight: 700; cursor: pointer; width: 100%; margin-bottom: 5px; }
        
        @media (max-width: 768px) {
            .form-group { grid-template-columns: 1fr; }
            th { display: none; }
            tr { display: block; margin-bottom: 20px; border: 1px solid #eee; border-radius: 15px; padding: 10px; background: #fff; }
            td { display: block; border: none; padding: 5px; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>🚀 Stellar Portal</h1>
        <div class="price-badges">
            <div id="xlmPrice" class="badge">XLM: --</div>
            <div id="usdPrice" class="badge">USD/JPY: --</div>
        </div>
    </header>

    <div class="form-group">
        <input type="text" id="nameInput" placeholder="名前">
        <input type="text" id="addrInput" placeholder="アドレス (G...)">
        <button class="btn-add" onclick="addAccount()">追加</button>
    </div>

    <table>
        <thead>
            <tr>
                <th style="width: 25%;">Account</th>
                <th style="width: 60%;">Portfolio</th>
                <th style="width: 15%;">Manage</th>
            </tr>
        </thead>
        <tbody id="mainList"></tbody>
    </table>
</div>

<script>
    let accounts = JSON.parse(localStorage.getItem('xlm_stardust_v1')) || [];
    let xlmJpy = 0;
    let usdJpy = 0;

    window.onload = async () => {
        await fetchPrices();
        render();
        setInterval(fetchPrices, 300000);
    };

    async function fetchPrices() {
        try {
            const res = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=stellar,usd-coin&vs_currencies=jpy');
            const data = await res.json();
            xlmJpy = data.stellar.jpy;
            usdJpy = data['usd-coin'].jpy;
            document.getElementById('xlmPrice').innerText = `XLM: ¥${xlmJpy.toLocaleString()}`;
            document.getElementById('usdPrice').innerText = `USD/JPY: ¥${usdJpy.toLocaleString()}`;
            render();
        } catch (e) { console.error("Price Error"); }
    }

    async function getRate(code, issuer) {
        try {
            const res = await fetch(`https://horizon.stellar.org/order_book?selling_asset_type=${code.length > 4 ? 'credit_alphanum12' : 'credit_alphanum4'}&selling_asset_code=${code}&selling_asset_issuer=${issuer}&buying_asset_type=native&limit=1`);
            const data = await res.json();
            return (data.bids && data.bids.length > 0) ? parseFloat(data.bids[0].price) : 0;
        } catch (e) { return 0; }
    }

    function addAccount() {
        const n = document.getElementById('nameInput'), a = document.getElementById('addrInput');
        if(!a.value.trim().startsWith('G')) return alert("Gから始まるアドレスを入力してください");
        accounts.push({ id: Date.now(), name: n.value || "未設定", addr: a.value.trim() });
        localStorage.setItem('xlm_stardust_v1', JSON.stringify(accounts));
        n.value = ''; a.value = '';
        render();
    }

    function render() {
        const list = document.getElementById('mainList');
        list.innerHTML = '';
        accounts.forEach(acc => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>
                    <span class="acc-name">${acc.name}</span>
                    <span class="acc-addr">${acc.addr.substring(0,8)}...${acc.addr.slice(-4)}</span>
                </td>
                <td id="assets-${acc.id}"><span style="color:#ccc; font-size:12px;">読み込み中...</span></td>
                <td>
                    <button class="btn-action" style="background:var(--edit)" onclick="renameAcc(${acc.id})">変更</button>
                    <button class="btn-action" style="background:var(--danger)" onclick="removeAcc(${acc.id})">削除</button>
                </td>
            `;
            list.appendChild(tr);
            loadAssets(acc);
        });
    }

    async function loadAssets(acc) {
        try {
            const res = await fetch(`https://horizon.stellar.org/accounts/${acc.addr}`);
            const data = await res.json();
            const container = document.getElementById(`assets-${acc.id}`);
            container.innerHTML = '';

            let total = 0;
            const combined = {};

            for (const b of data.balances.filter(x => parseFloat(x.balance) > 0)) {
                const isXlm = b.asset_type === 'native';
                const code = isXlm ? 'XLM' : b.asset_code;
                const amt = parseFloat(b.balance);
                
                let rate = isXlm ? 1 : await getRate(code, b.asset_issuer);
                let jpy = (code === 'USDC') ? amt * usdJpy : amt * rate * xlmJpy;

                if (combined[code]) {
                    combined[code].amt += amt;
                    combined[code].jpy += jpy;
                } else {
                    combined[code] = { amt, jpy };
                }
            }

            const wrapper = document.createElement('div');
            wrapper.className = 'asset-container';

            for (const code in combined) {
                const asset = combined[code];
                total += asset.jpy;
                
                // 表示条件: XLM, USDC, STARDUST(SDUST)は必ず表示、それ以外は0.1円以上の価値があるもの
                if (asset.jpy < 0.1 && !['XLM', 'USDC', 'STARDUST', 'SDUST'].includes(code)) continue;

                const div = document.createElement('div');
                div.className = 'asset-card';
                // STARDUST系ならクラスを追加して色を変える
                const specialClass = (code === 'STARDUST' || code === 'SDUST') ? 'stardust' : '';
                
                div.innerHTML = `
                    <div style="display:flex; align-items:center;">
                        <span class="asset-code ${specialClass}">${code}</span>
                        <span class="asset-amt">${asset.amt.toLocaleString()}</span>
                    </div>
                    <span class="asset-jpy">¥${Math.round(asset.jpy).toLocaleString()}</span>
                `;
                wrapper.appendChild(div);
            }
            container.appendChild(wrapper);
            container.innerHTML += `<div class="total-row">合計: ¥${Math.round(total).toLocaleString()}</div>`;

        } catch (e) { document.getElementById(`assets-${acc.id}`).innerText = "エラー"; }
    }

    window.renameAcc = (id) => {
        const acc = accounts.find(x => x.id === id);
        const n = prompt("名前:", acc.name);
        if(n) { acc.name = n; localStorage.setItem('xlm_stardust_v1', JSON.stringify(accounts)); render(); }
    };
    window.removeAcc = (id) => {
        if(confirm("削除しますか？")) {
            accounts = accounts.filter(x => x.id !== id);
            localStorage.setItem('xlm_stardust_v1', JSON.stringify(accounts));
            render();
        }
    };
</script>
</body>
</html>
