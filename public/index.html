<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stellar Multi-Asset Tracker</title>
    <style>
        :root { --primary: #0070f3; --danger: #ff4d4d; --edit: #f5a623; --jpy: #2c3e50; --success: #00c853; }
        body { font-family: -apple-system, sans-serif; background: #f0f2f5; margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        h1 { color: #333; font-size: 22px; border-bottom: 2px solid #eee; padding-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .price-tag { font-size: 0.6em; color: var(--primary); font-weight: bold; background: #eef2f7; padding: 4px 10px; border-radius: 15px; }
        
        .form-group { display: grid; grid-template-columns: 1fr 1.5fr auto; gap: 10px; margin-bottom: 30px; background: #f8f9fa; padding: 15px; border-radius: 8px; }
        input { padding: 12px; border: 1px solid #ddd; border-radius: 6px; }
        
        button { padding: 10px 15px; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; }
        .btn-add { background: var(--primary); color: white; }
        .btn-edit { background: var(--edit); color: white; font-size: 12px; }
        .btn-delete { background: var(--danger); color: white; font-size: 12px; }

        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 12px; border-bottom: 2px solid #eee; background: #fafafa; }
        td { padding: 15px; border-bottom: 1px solid #eee; vertical-align: top; }
        
        .asset-list { list-style: none; padding: 0; margin: 0; }
        .asset-item { display: flex; justify-content: space-between; margin-bottom: 6px; font-size: 0.95em; align-items: center; }
        .asset-code { font-weight: bold; color: var(--primary); width: 60px; background: #f0f7ff; padding: 2px 5px; border-radius: 4px; text-align: center; }
        .jpy-val { color: #555; font-weight: bold; font-size: 0.9em; margin-left: 10px; }
        .total-jpy { font-weight: bold; color: var(--success); margin-top: 8px; border-top: 1px dashed #ccc; padding-top: 8px; text-align: right; font-size: 1.1em; }
    </style>
</head>
<body>

<div class="container">
    <h1>
        🚀 Stellar 資産管理ポータル
        <span id="xlmPrice" class="price-tag">XLM価格取得中...</span>
    </h1>

    <div class="form-group">
        <input type="text" id="nameInput" placeholder="名前 (例: 調査対象A)">
        <input type="text" id="addrInput" placeholder="Stellarアドレス (G...)">
        <button class="btn-add" onclick="addEntry()">追加</button>
    </div>

    <table>
        <thead>
            <tr>
                <th style="width: 20%;">名前</th>
                <th style="width: 25%;">アドレス</th>
                <th style="width: 40%;">保有通貨 (全自動換算)</th>
                <th style="width: 15%;">操作</th>
            </tr>
        </thead>
        <tbody id="listBody"></tbody>
    </table>
</div>

<script>
    let accounts = JSON.parse(localStorage.getItem('xlm_v2_data')) || [];
    let xlmToJpy = 0;

    init();

    async function init() {
        await fetchXLMPrice();
        render();
        setInterval(fetchXLMPrice, 300000); // 5分更新
    }

    async function fetchXLMPrice() {
        try {
            const res = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=stellar&vs_currencies=jpy');
            const data = await res.json();
            xlmToJpy = data.stellar.jpy;
            document.getElementById('xlmPrice').innerText = `1 XLM = ¥${xlmToJpy.toLocaleString()}`;
            render();
        } catch (e) {
            document.getElementById('xlmPrice').innerText = "価格取得エラー";
        }
    }

    // DEXから各トークンのXLMレートを取得する
    async function getPriceInXLM(code, issuer) {
        try {
            const url = `https://horizon.stellar.org/order_book?selling_asset_type=credit_alphanum4&selling_asset_code=${code}&selling_asset_issuer=${issuer}&buying_asset_type=native&limit=1`;
            const res = await fetch(url);
            const data = await res.json();
            return (data.bids && data.bids.length > 0) ? parseFloat(data.bids[0].price) : 0;
        } catch (e) { return 0; }
    }

    function addEntry() {
        const n = document.getElementById('nameInput');
        const a = document.getElementById('addrInput');
        if (!a.value.startsWith('G')) return alert("アドレスが正しくありません");
        accounts.push({ id: Date.now(), name: n.value || "未設定", address: a.value.trim() });
        save();
        n.value = ''; a.value = '';
    }

    function save() {
        localStorage.setItem('xlm_v2_data', JSON.stringify(accounts));
        render();
    }

    function render() {
        const body = document.getElementById('listBody');
        body.innerHTML = '';
        accounts.forEach(acc => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td><strong>${acc.name}</strong></td>
                <td><small style="color:#999; word-break:break-all;">${acc.address.substring(0,15)}...</small></td>
                <td id="assets-${acc.id}"><span style="color:#ccc">読込中...</span></td>
                <td>
                    <button class="btn-edit" onclick="rename(${acc.id})">名変</button>
                    <button class="btn-delete" onclick="remove(${acc.id})">削除</button>
                </td>
            `;
            body.appendChild(tr);
            fetchBalances(acc);
        });
    }

    async function fetchBalances(acc) {
        try {
            const res = await fetch(`https://horizon.stellar.org/accounts/${acc.address}`);
            const data = await res.json();
            const container = document.getElementById(`assets-${acc.id}`);
            container.innerHTML = '';

            let totalAccJpy = 0;
            const activeBalances = data.balances.filter(b => parseFloat(b.balance) > 0);

            for (const b of activeBalances) {
                const code = b.asset_type === 'native' ? 'XLM' : b.asset_code;
                const amount = parseFloat(b.balance);
                
                // 価格計算：XLMは1、他はDEXからレート取得
                let priceInXlm = (b.asset_type === 'native') ? 1 : await getPriceInXLM(code, b.asset_issuer);
                
                // 円換算
                let jpyValue = amount * priceInXlm * xlmToJpy;
                totalAccJpy += jpyValue;

                const item = document.createElement('div');
                item.className = 'asset-item';
                item.innerHTML = `
                    <div><span class="asset-code">${code}</span> ${amount.toLocaleString()}</div>
                    <span class="jpy-val">¥${Math.round(jpyValue).toLocaleString()}</span>
                `;
                container.appendChild(item);
            }

            if (totalAccJpy > 0) {
                const totalDiv = document.createElement('div');
                totalDiv.className = 'total-jpy';
                totalDiv.innerHTML = `合計目安: ¥${Math.round(totalAccJpy).toLocaleString()}`;
                container.appendChild(totalDiv);
            }
        } catch (e) { container.innerText = "エラー"; }
    }

    function rename(id) {
        const acc = accounts.find(a => a.id === id);
        const n = prompt("名前変更", acc.name);
        if (n) { acc.name = n; save(); }
    }

    function remove(id) {
        if (confirm("削除しますか？")) {
            accounts = accounts.filter(a => a.id !== id);
            save();
        }
    }
</script>
</body>
</html>
